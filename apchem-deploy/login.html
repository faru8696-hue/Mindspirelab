<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — MindSpire Lab AP Chemistry</title>
<link rel="icon" href="/favicon.ico"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-wrap{width:100%;max-width:440px}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
.brand svg{width:38px;height:38px}
.brand-text{font-size:20px;font-weight:900;color:#fff}
.brand-sub{font-size:12px;color:#a5b4fc;font-weight:500;margin-top:1px}
.card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.card-title{font-size:22px;font-weight:800;color:#0f172a;margin-bottom:4px}
.card-sub{font-size:13px;color:#6b7280;margin-bottom:28px}
.tabs{display:flex;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;color:#6b7280;border-radius:8px;cursor:pointer;transition:.2s}
.tab.active{background:#fff;color:#4f46e5;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;color:#0f172a;transition:.2s;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:#6c63ff;box-shadow:0 0 0 3px rgba(108,99,255,.12)}
.field .pw-wrap{position:relative}
.field .pw-wrap input{padding-right:44px}
.field .pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#9ca3af;cursor:pointer;font-size:14px}
.field .pw-eye:hover{color:#4f46e5}
.name-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#6c63ff,#4f46e5);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.4)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#9ca3af;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;border-top:1px solid #e5e7eb}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.alert.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626}
.alert.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a}
.role-chips{display:flex;gap:10px}
.role-chip{flex:1;padding:11px;border:1.5px solid #e5e7eb;border-radius:10px;text-align:center;cursor:pointer;transition:.2s;font-size:13px;font-weight:600;color:#6b7280}
.role-chip:hover{border-color:#6c63ff;color:#6c63ff}
.role-chip.selected{border-color:#6c63ff;background:#ede9fe;color:#4f46e5}
.role-chip .rc-icon{font-size:22px;display:block;margin-bottom:4px}
.forgot{text-align:right;margin-top:-8px;margin-bottom:16px}
.forgot a{font-size:12px;color:#6c63ff;text-decoration:none;font-weight:500}
.forgot a:hover{text-decoration:underline}
.footer-note{text-align:center;font-size:12px;color:#6b7280;margin-top:20px}
.footer-note a{color:#6c63ff;text-decoration:none;font-weight:500}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hero-bg{text-align:center;margin-bottom:20px;color:#c4b5fd;font-size:13px;font-weight:500}
</style>
</head>
<body>
<div class="auth-wrap">

  <div class="brand">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
      <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient></defs>
      <rect width="36" height="36" rx="10" fill="url(#lg)"/>
      <circle cx="18" cy="18" r="3" fill="white" opacity=".95"/>
      <ellipse cx="18" cy="18" rx="10.5" ry="4" stroke="white" stroke-width="1.6" fill="none" opacity=".9"/>
      <ellipse cx="18" cy="18" rx="10.5" ry="4" stroke="white" stroke-width="1.6" fill="none" opacity=".9" transform="rotate(60 18 18)"/>
      <ellipse cx="18" cy="18" rx="10.5" ry="4" stroke="white" stroke-width="1.6" fill="none" opacity=".9" transform="rotate(120 18 18)"/>
      <circle cx="28.5" cy="18" r="1.8" fill="#f59e0b"/>
    </svg>
    <div>
      <div class="brand-text">MindSpire Lab</div>
      <div class="brand-sub">AP Chemistry Platform</div>
    </div>
  </div>

  <div class="hero-bg">🧪 810+ AP Chemistry questions · Track progress · Assignments & Tests</div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</div>
    </div>

    <div id="alert" class="alert"></div>

    <!-- ── SIGN IN ── -->
    <div id="form-signin">
      <div class="card-title">Welcome back 👋</div>
      <div class="card-sub">Sign in to your AP Chemistry account</div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="si-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="si-pass" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"/>
          <span class="pw-eye" onclick="togglePw('si-pass',this)"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <div class="forgot"><a href="#" onclick="doForgot(event)">Forgot password?</a></div>
      <button class="btn-submit" id="btn-signin" onclick="doSignIn()">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </div>

    <!-- ── SIGN UP ── -->
    <div id="form-signup" style="display:none">
      <div class="card-title">Create Account</div>
      <div class="card-sub">Join your class on MindSpire Lab</div>
      <div class="field">
        <label>I am a…</label>
        <div class="role-chips">
          <div class="role-chip selected" id="role-student" onclick="selectRole('student')">
            <span class="rc-icon">🎓</span> Student
          </div>
          <div class="role-chip" id="role-teacher" onclick="selectRole('teacher')">
            <span class="rc-icon">👩‍🏫</span> Teacher
          </div>
        </div>
      </div>
      <div class="name-row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="su-first" placeholder="Jane" autocomplete="given-name"/>
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="su-last" placeholder="Smith" autocomplete="family-name"/>
        </div>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="su-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="su-pass" placeholder="Min 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignUp()"/>
          <span class="pw-eye" onclick="togglePw('su-pass',this)"><i class="fas fa-eye"></i></span>
        </div>
      </div>
      <div id="teacher-code-wrap" style="display:none">
        <div class="field">
          <label>Teacher Access Code</label>
          <input type="text" id="su-teacher-code" placeholder="Contact admin for code"/>
        </div>
      </div>
      <button class="btn-submit" id="btn-signup" onclick="doSignUp()">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </div>

    <div class="footer-note">
      <a href="https://mindspirelab.com">← Back to MindSpire Lab</a>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
const SUPABASE_URL = 'https://qmrpbxiiwbqnmczdxoqr.supabase.co';
const SUPABASE_ANON = 'sb_publishable_t8Q_10VZIilu1bZlJXyzsA_w-LUu_E2';
const TEACHER_CODES = ['TEACHER2026','MINDSPIRE_TEACHER','MSL_TEACH26'];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let selectedRole = 'student';

// ── REDIRECT IF ALREADY LOGGED IN ─────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) redirectUser(session.user);
})();

async function redirectUser(user) {
  const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();
  const role = profile?.role || 'student';
  if (role === 'teacher') {
    window.location.href = '/teacher';
  } else {
    window.location.href = '/';
  }
}

// ── TAB SWITCH ─────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  clearAlert();
}

// ── ROLE SELECT ────────────────────────────────────────────────
function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-student').classList.toggle('selected', role === 'student');
  document.getElementById('role-teacher').classList.toggle('selected', role === 'teacher');
  document.getElementById('teacher-code-wrap').style.display = role === 'teacher' ? 'block' : 'none';
}

// ── PASSWORD TOGGLE ────────────────────────────────────────────
function togglePw(id, el) {
  const inp = document.getElementById(id);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  el.innerHTML = `<i class="fas fa-${isHidden ? 'eye-slash' : 'eye'}"></i>`;
}

// ── ALERT ──────────────────────────────────────────────────────
function showAlert(msg, type='err') {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert ' + type;
  el.style.display = 'block';
}
function clearAlert() {
  const el = document.getElementById('alert');
  el.style.display = 'none';
}

// ── SIGN IN ────────────────────────────────────────────────────
async function doSignIn() {
  clearAlert();
  const email = document.getElementById('si-email').value.trim();
  const pass = document.getElementById('si-pass').value;
  if (!email || !pass) { showAlert('Please enter your email and password.'); return; }
  
  const btn = document.getElementById('btn-signin');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showAlert(error.message === 'Invalid login credentials'
      ? '❌ Incorrect email or password.' : '❌ ' + error.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    return;
  }
  showAlert('✅ Signed in! Redirecting…', 'ok');
  redirectUser(data.user);
}

// ── SIGN UP ────────────────────────────────────────────────────
async function doSignUp() {
  clearAlert();
  const first = document.getElementById('su-first').value.trim();
  const last = document.getElementById('su-last').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass = document.getElementById('su-pass').value;

  if (!first || !last) { showAlert('Please enter your full name.'); return; }
  if (!email) { showAlert('Please enter your email address.'); return; }
  if (pass.length < 6) { showAlert('Password must be at least 6 characters.'); return; }

  if (selectedRole === 'teacher') {
    const code = document.getElementById('su-teacher-code').value.trim().toUpperCase();
    if (!TEACHER_CODES.includes(code)) {
      showAlert('❌ Invalid teacher access code. Contact the administrator.');
      return;
    }
  }

  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Creating account…';

  const { data, error } = await sb.auth.signUp({
    email,
    password: pass,
    options: {
      data: { full_name: `${first} ${last}`, role: selectedRole }
    }
  });

  if (error) {
    showAlert('❌ ' + error.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    return;
  }

  if (data.user && !data.session) {
    showAlert('✅ Account created! Please check your email to confirm.', 'ok');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
  } else if (data.session) {
    showAlert('✅ Account created! Redirecting…', 'ok');
    setTimeout(() => redirectUser(data.user), 800);
  }
}

// ── FORGOT PASSWORD ────────────────────────────────────────────
async function doForgot(e) {
  e.preventDefault();
  const email = document.getElementById('si-email').value.trim();
  if (!email) { showAlert('Enter your email above first, then click Forgot password.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password'
  });
  if (error) { showAlert('❌ ' + error.message); return; }
  showAlert('✅ Password reset email sent! Check your inbox.', 'ok');
}
</script>
</body>
</html>
