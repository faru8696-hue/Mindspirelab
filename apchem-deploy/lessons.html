<style>
:root{--p:#6c63ff;--pd:#4f46e5;--grn:#10b981;--org:#f59e0b;--red:#ef4444;
  --dark:#0f172a;--text:#374151;--muted:#6b7280;--border:#e5e7eb;--bg:#f8fafc;--card:#fff}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer}

/* NAV */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:300;background:#fff;
  border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;
  align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.nav-brand{display:flex;align-items:center;gap:8px;font-weight:900;font-size:16px;color:var(--dark)}
.nav-brand svg{width:30px;height:30px}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
  padding:6px 12px;border-radius:8px;border:1px solid var(--border);transition:.15s;background:#fff}
.btn-back:hover{background:var(--bg);color:var(--dark)}
.btn-logout{font-size:12px;color:#9ca3af;padding:5px 12px;border-radius:8px;
  border:1px solid var(--border);background:none;transition:.2s}
.btn-logout:hover{background:#f1f5f9}

/* PAGE LAYOUT */
.page{padding-top:76px;padding-bottom:60px;max-width:900px;margin:0 auto;padding-left:20px;padding-right:20px}

/* HEADER BANNER */
.hero-banner{background:linear-gradient(135deg,#0f0c29,#1e1b4b,#2d2566);border-radius:20px;
  padding:36px;margin-bottom:28px;position:relative;overflow:hidden}
.hero-banner::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 60%,rgba(108,99,255,.4),transparent 60%),
             radial-gradient(ellipse at 85% 20%,rgba(245,158,11,.15),transparent 45%)}
.hb-inner{position:relative;z-index:1}
.hb-title{font-size:clamp(22px,3vw,28px);font-weight:900;color:#fff;margin-bottom:8px}
.hb-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:20px;max-width:560px;line-height:1.6}
.hb-stats{display:flex;gap:14px;flex-wrap:wrap}
.hs{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);padding:10px 16px;
  border-radius:10px;text-align:center}
.hs-num{font-size:18px;font-weight:900;color:#fff}
.hs-lbl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px}

/* UNIT CARDS */
.unit-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  margin-bottom:16px;overflow:hidden;transition:.2s}
.unit-card:hover{border-color:rgba(108,99,255,.3);box-shadow:0 4px 20px rgba(0,0,0,.06)}

.unit-header{display:flex;align-items:center;gap:14px;padding:18px 22px;cursor:pointer;
  user-select:none;transition:.15s}
.unit-header:hover{background:#fafafa}
.unit-icon-box{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}
.unit-meta{flex:1}
.unit-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);margin-bottom:2px}
.unit-name{font-size:15px;font-weight:800;color:var(--dark)}
.unit-right{display:flex;align-items:center;gap:10px}
.progress-mini{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.progress-track{width:60px;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.expand-icon{color:var(--muted);transition:.25s;font-size:13px}
.unit-card.open .expand-icon{transform:rotate(180deg)}
.free-tag{font-size:10px;font-weight:700;background:#dcfce7;color:#16a34a;
  padding:2px 8px;border-radius:20px}
.paid-tag{font-size:10px;font-weight:700;background:#fef3c7;color:#d97706;
  padding:2px 8px;border-radius:20px}

/* UNIT BODY */
.unit-body{display:none;border-top:1px solid var(--border);padding:24px 22px}
.unit-card.open .unit-body{display:block}

/* TOPICS */
.topic{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.topic:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.topic-title{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.topic-title::before{content:'';width:3px;height:16px;border-radius:2px;background:var(--p);flex-shrink:0}

.concept-list{margin-bottom:12px;padding-left:0;list-style:none}
.concept-list li{font-size:13px;line-height:1.75;color:var(--text);padding:2px 0 2px 20px;position:relative}
.concept-list li::before{content:'→';position:absolute;left:0;color:var(--p);font-size:11px;font-weight:700;top:4px}

/* AP TIP BOX */
.ap-tip{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border:1px solid #c4b5fd;
  border-radius:10px;padding:12px 14px;margin-bottom:10px}
.ap-tip-label{font-size:11px;font-weight:800;color:#6d28d9;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.ap-tip-text{font-size:13px;color:#4c1d95;line-height:1.6}

/* FORMULA BOX */
.formula-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.formula-label{font-size:11px;font-weight:800;color:#0284c7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.formula-list{display:flex;flex-wrap:wrap;gap:8px}
.formula-item{background:#fff;border:1px solid #bae6fd;border-radius:8px;padding:6px 12px;
  font-size:12px;font-family:'Courier New',monospace;color:#0f172a;font-weight:600}

/* PRACTICE BUTTON */
.btn-practice{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--p),var(--pd));
  color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;
  border:none;cursor:pointer;transition:.2s;text-decoration:none;margin-top:12px}
.btn-practice:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(108,99,255,.35)}

/* SEARCH BAR */
.search-wrap{margin-bottom:20px}
.search-input{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:12px;
  font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:.2s;background:#fff}
.search-input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(108,99,255,.1)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:#1e293b;color:#fff;
  padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;
  transform:translateY(70px);opacity:0;transition:.3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

/* LOCK OVERLAY */
.lock-overlay{text-align:center;padding:28px;background:#f8fafc;border-radius:12px;
  border:1.5px dashed var(--border);margin-top:8px}
.lock-overlay .lo-icon{font-size:32px;margin-bottom:8px}
.lock-overlay p{font-size:13px;color:var(--muted)}

@media(max-width:600px){
  .hb-stats{gap:8px}
  .hs{padding:8px 12px}
  .unit-header{padding:14px 16px;gap:10px}
  .unit-body{padding:18px 16px}
/* LOADING */
#authLoading{position:fixed;inset:0;background:#f8fafc;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#authLoading .ld-spin{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#6c63ff;
  border-radius:50%;animation:ldSpin .8s linear infinite}
#authLoading .ld-text{font-size:14px;font-weight:600;color:#6b7280}
@keyframes ldSpin{to{transform:rotate(360deg)}}
</style>
</head>

// ── INIT ────────────────────────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/login'; return; }
  currentUser = session.user;
  const { data: profile } = await sb.from('profiles').select('role,is_paid').eq('id', currentUser.id).single();
  if (profile?.role === 'teacher') isPaid = true; // teachers see all
  else isPaid = profile?.is_paid || false;
  try { if (localStorage.getItem('msl_paid')==='1') isPaid=true; } catch(e){}
  const ld = document.getElementById('authLoading');
  if (ld) ld.remove();
  renderUnits(LESSONS);
})();

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = '/login';
}

// ── RENDER ───────────────────────────────────────────────────────────────────────
function renderUnits(units) {
  const c = document.getElementById('unitsContainer');
  c.innerHTML = units.map(unit => {
    const accessible = unit.free || isPaid;
    return `<div class="unit-card" id="uc-${unit.id}">
      <div class="unit-header" onclick="toggleUnit(${unit.id})">
        <div class="unit-icon-box" style="background:${unit.color}20">${unit.icon}</div>
        <div class="unit-meta">
          <div class="unit-num">Unit ${unit.id}</div>
          <div class="unit-name">${unit.name}</div>
        </div>
        <div class="unit-right">
          ${unit.free ? '<span class="free-tag">Free</span>' : (isPaid ? '<span class="free-tag">Unlocked</span>' : '<span class="paid-tag">🔒 Paid</span>')}
          <span style="font-size:12px;color:var(--muted)">${unit.topics.length} topics</span>
          <i class="fas fa-chevron-down expand-icon"></i>
        </div>
      </div>
      <div class="unit-body">
        ${accessible ? unit.topics.map(t => renderTopic(t, unit.color)).join('') : `
          <div class="lock-overlay">
            <div class="lo-icon">🔒</div>
            <p>This unit requires a paid plan.</p>
            <a href="https://mindspirelab.com/pricing" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:var(--p);color:#fff;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;text-decoration:none;margin-top:12px"><i class="fas fa-unlock"></i> View Plans</a>
          </div>`}
        ${accessible ? `<a href="/" class="btn-practice"><i class="fas fa-flask"></i> Practice Unit ${unit.id} Questions</a>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderTopic(t, color) {
  return `<div class="topic">
    <div class="topic-title">${t.name}</div>
    <ul class="concept-list">
      ${t.concepts.map(c => `<li>${c}</li>`).join('')}
    </ul>
    ${t.tip ? `<div class="ap-tip">
      <div class="ap-tip-label">⭐ AP Exam Tip</div>
      <div class="ap-tip-text">${t.tip}</div>
    </div>` : ''}
    ${t.formulas?.length ? `<div class="formula-box">
      <div class="formula-label">📐 Key Formulas</div>
      <div class="formula-list">${t.formulas.map(f => `<div class="formula-item">${f}</div>`).join('')}</div>
    </div>` : ''}
  </div>`;
}

function toggleUnit(id) {
  const card = document.getElementById('uc-' + id);
  card.classList.toggle('open');
}

function filterUnits(q) {
  const query = q.toLowerCase().trim();
  if (!query) { renderUnits(LESSONS); return; }
  const filtered = LESSONS.filter(u =>
    u.name.toLowerCase().includes(query) ||
    u.topics.some(t =>
      t.name.toLowerCase().includes(query) ||
      t.concepts.some(c => c.toLowerCase().includes(query)) ||
      (t.tip||'').toLowerCase().includes(query)
    )
  );
  renderUnits(filtered.length ? filtered : LESSONS);
  if (query && filtered.length) {
    // Auto-open matched units
    filtered.forEach(u => {
      const card = document.getElementById('uc-' + u.id);
      if (card && !card.classList.contains('open')) card.classList.add('open');
    });
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
